dataset:
  name: bdd100k
  num_classes: 1
  pre_size: 256
  image_size: 224

  interpolation: bilinear
  normalization_type: imagenet

  num_workers: '@{num_workers}'
  num_gpus: '@{num_gpus}'
  num_machines: '@{num_machines}'

  split_names: [train, val, test]

  train:
    dataset_class: ImglistDataset
    data_dir: ../data/id/bdd100k/bdd100k/bdd100k/images/
    imglist_pth: ../data/benchmark_imglist/autonomous/bdd100k/train.txt
    batch_size: 64
    shuffle: True
  val:
    dataset_class: ImglistDataset
    data_dir: ../data/id/bdd100k/bdd100k/bdd100k/images/
    imglist_pth: ../data/benchmark_imglist/autonomous/bdd100k/val.txt
    batch_size: 64
    shuffle: False
  test:
    dataset_class: ImglistDataset
    data_dir: ../data/id/bdd100k/bdd100k/bdd100k/images/
    imglist_pth: ../data/benchmark_imglist/autonomous/bdd100k/test.txt
    batch_size: 64
    shuffle: False